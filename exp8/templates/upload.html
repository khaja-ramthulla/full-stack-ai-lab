    <!DOCTYPE html>
<html>
<head>
    <title>Digit Recognition</title>
    <style>
/* =========================
   Root & Reset
   ========================= */
:root {
    --bg-main: #0b0f1a;
    --bg-card: rgba(255, 255, 255, 0.08);
    --border-glass: rgba(255, 255, 255, 0.18);
    --text-main: #eaeaf0;
    --text-muted: #a0a3bd;
    --accent: #5ddcff;
    --accent-2: #7c7cff;
    --success: #4ade80;
    --error: #f87171;
    --radius: 16px;
    --blur: 14px;
}

* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    font-family: "Inter", "Segoe UI", system-ui, sans-serif;
}

body {
    min-height: 100vh;
    background:
        radial-gradient(circle at 20% 20%, #1b1f3b, transparent 40%),
        radial-gradient(circle at 80% 80%, #1f2b4a, transparent 40%),
        var(--bg-main);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-main);
}

/* =========================
   Main Card
   ========================= */
.container {
    width: 420px;
    padding: 32px 28px;
    background: var(--bg-card);
    backdrop-filter: blur(var(--blur));
    border-radius: var(--radius);
    border: 1px solid var(--border-glass);
    box-shadow:
        0 20px 40px rgba(0, 0, 0, 0.6),
        inset 0 0 0 1px rgba(255, 255, 255, 0.04);
    animation: fadeUp 0.6s ease-out;
}

/* =========================
   Headings
   ========================= */
.container h2 {
    text-align: center;
    font-weight: 700;
    font-size: 1.4rem;
    margin-bottom: 24px;
    background: linear-gradient(90deg, var(--accent), var(--accent-2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

/* =========================
   Upload Input
   ========================= */
input[type="file"] {
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    background: rgba(255, 255, 255, 0.06);
    border: 1px dashed var(--border-glass);
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.25s ease;
}

input[type="file"]:hover {
    border-color: var(--accent);
    background: rgba(93, 220, 255, 0.08);
}

/* =========================
   Button
   ========================= */
button {
    width: 100%;
    margin-top: 20px;
    padding: 14px;
    font-size: 1rem;
    font-weight: 600;
    border-radius: 12px;
    border: none;
    cursor: pointer;
    color: #0b0f1a;
    background: linear-gradient(135deg, var(--accent), var(--accent-2));
    box-shadow:
        0 10px 25px rgba(93, 220, 255, 0.35);
    transition: transform 0.2s ease, box-shadow 0.2s ease;
}

button:hover {
    transform: translateY(-2px);
    box-shadow:
        0 14px 35px rgba(124, 124, 255, 0.45);
}

button:active {
    transform: translateY(0);
}

/* =========================
   Result Section
   ========================= */
#result {
    margin-top: 26px;
    text-align: center;
    animation: fadeIn 0.4s ease-in;
}

#result p {
    margin-bottom: 10px;
    font-size: 1rem;
}

#result b {
    color: var(--success);
    font-size: 1.2rem;
}

/* =========================
   Image Preview
   ========================= */
#result img {
    margin-top: 12px;
    border-radius: 10px;
    border: 1px solid var(--border-glass);
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
}

/* =========================
   Error Text
   ========================= */
.error {
    color: var(--error);
    font-weight: 500;
}

/* =========================
   Animations
   ========================= */
@keyframes fadeUp {
    from {
        opacity: 0;
        transform: translateY(20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

@keyframes fadeIn {
    from {
        opacity: 0;
    }
    to {
        opacity: 1;
    }
}
</style>

</head>
<body>
<div class="container">
    <h2>Upload Image for Digit Recognition</h2>

    <form id="uploadForm" enctype="multipart/form-data">
        <input type="file" name="file" accept="image/*" required>
        <button type="submit">Predict</button>
    </form>

    <div id="result"></div>
</div>


<script>
document.getElementById('uploadForm').onsubmit = async function(e) {
    e.preventDefault();
    const formData = new FormData(this);

    const res = await fetch('/predict', {
        method: 'POST',
        body: formData
    });

    const out = await res.json();
    const result = document.getElementById('result');

    if (out.prediction !== undefined) {
        result.innerHTML =
            `<p>Predicted Digit: <b>${out.prediction}</b></p>
             <p>Confidence: ${out.confidence.toFixed(2)}</p>
             <img src="/static/uploads/${out.filename}" width="100">`;
    } else {
        result.innerHTML = `<p style="color:red;">${out.error}</p>`;
    }
};
</script>
</body>
</html>
