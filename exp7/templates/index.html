<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>JWT Authentication Demo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/jwt.css') }}">
</head>
<body>

<div class="container">

    <h1>🔐 JWT Authentication System</h1>
    <p class="subtitle">Stateless token-based authentication with Flask</p>

    <!-- AUTH SECTION -->
    <div id="authSection">

        <div class="tab-buttons">
            <button class="tab-btn active" onclick="switchTab(event,'loginTab')">Login</button>
            <button class="tab-btn" onclick="switchTab(event,'signupTab')">Sign Up</button>
        </div>

        <!-- LOGIN -->
        <div id="loginTab" class="tab-content active">
            <div class="form-group">
                <label>Email</label>
                <input id="loginEmail" type="email" placeholder="your@email.com">
            </div>

            <div class="form-group">
                <label>Password</label>
                <input id="loginPassword" type="password" placeholder="Password">
                <span class="toggle-password" onclick="togglePassword('loginPassword')">Show</span>
            </div>

            <button type="button" class="btn" onclick="handleLogin()">Login</button>
        </div>

        <!-- SIGNUP -->
        <div id="signupTab" class="tab-content">
            <div class="form-group">
                <label>Email</label>
                <input id="signupEmail" type="email" placeholder="your@email.com">
            </div>

            <div class="form-group">
                <label>Password</label>
                <input id="signupPassword" type="password" placeholder="Min 6 characters">
                <span class="toggle-password" onclick="togglePassword('signupPassword')">Show</span>
            </div>

            <div class="form-group">
                <label>Confirm Password</label>
                <input id="confirmPassword" type="password" placeholder="Confirm password">
                <span class="toggle-password" onclick="togglePassword('confirmPassword')">Show</span>
            </div>

            <button type="button" class="btn" onclick="handleSignup()">Sign Up</button>
        </div>

    </div>

    <!-- DASHBOARD -->
    <div id="dashboard" style="display:none;">

        <h2 id="welcomeText">Welcome!</h2>

        <div class="dashboard-grid">
            <div class="card">
                <h3>Access Token</h3>
                <div id="accessToken" class="token-display"></div>
                <small>Valid for 1 hour</small>
            </div>

            <div class="card">
                <h3>Refresh Token</h3>
                <div id="refreshToken" class="token-display"></div>
                <small>Valid for 30 days</small>
            </div>
        </div>

        <div class="actions">
            <button class="btn-action btn-test" onclick="testProtected()">Test Protected Route</button>
            <button class="btn-action btn-refresh" onclick="refreshToken()">Refresh Access Token</button>
            <button class="btn-action btn-logout" onclick="logout()">Logout</button>
        </div>

        <div id="responseArea" style="display:none;"></div>

        <div id="accessMessage" class="message success">
            Access granted!
        </div>

    </div>

</div>

<script src="{{ url_for('static', filename='js/jwt.js') }}"></script>
</body>
</html>
